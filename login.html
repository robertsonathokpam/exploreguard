<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ExploreGuard — Sign In</title>
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Linked Modular Stylesheets -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <i data-lucide="map" style="width:22px; height:22px;"></i>
    </div>
    <span class="logo-text">ExploreGuard</span>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="showTab('login')">Sign In</div>
    <div class="tab" onclick="showTab('signup')">Sign Up</div>
  </div>

  <!-- Sign In Form -->
  <div id="login-form">
    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrapper">
        <input type="email" id="login-email" placeholder="you@email.com" required/>
        <i data-lucide="mail"></i>
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrapper">
        <input type="password" id="login-password" placeholder="Your password" required/>
        <i data-lucide="lock"></i>
      </div>
    </div>
    <button class="btn" onclick="loginUser()">Sign In <i data-lucide="log-in" style="width:18px;"></i></button>
    <div class="error" id="login-error"><i data-lucide="alert-circle" style="width:16px;"></i> <span id="login-err-text"></span></div>
  </div>

  <!-- Sign Up Form -->
  <div id="signup-form" style="display:none">
    <div class="form-group">
      <label>Full Name</label>
      <div class="input-wrapper">
        <input type="text" id="signup-name" placeholder="Your full name" required/>
        <i data-lucide="user"></i>
      </div>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrapper">
        <input type="email" id="signup-email" placeholder="you@email.com" required/>
        <i data-lucide="mail"></i>
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrapper">
        <input type="password" id="signup-password" placeholder="Min 6 characters" required/>
        <i data-lucide="lock"></i>
      </div>
    </div>
    <button class="btn" onclick="signupUser()">Create Account <i data-lucide="user-plus" style="width:18px;"></i></button>
    <div class="error" id="signup-error"><i data-lucide="alert-circle" style="width:16px;"></i> <span id="signup-err-text"></span></div>
    <div class="success" id="signup-success"><i data-lucide="check-circle" style="width:16px;"></i> <span id="signup-suc-text"></span></div>
  </div>

  <a class="back-home" href="index.html">
    <i data-lucide="arrow-left" style="width:16px; height:16px;"></i> Back to Landing Page
  </a>
</div>

<!-- External Modular JavaScript -->
<script type="module" src="js/login.js"></script>
</body>
</html>
