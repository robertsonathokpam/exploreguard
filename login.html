<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ExploreGuard — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f0faf5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; justify-content: center; }
    .logo-icon { width: 40px; height: 40px; background: #1D9E75; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 20px; }
    .logo-text { font-size: 22px; font-weight: 600; color: #1D9E75; }
    .tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 1.5rem; }
    .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 15px; color: #888; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
    .tab.active { color: #1D9E75; border-bottom-color: #1D9E75; font-weight: 500; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; font-weight: 500; }
    input { width: 100%; padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; transition: border 0.2s; }
    input:focus { border-color: #1D9E75; }
    .btn { width: 100%; padding: 12px; background: #1D9E75; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; margin-top: 0.5rem; transition: background 0.2s; }
    .btn:hover { background: #0F6E56; }
    .error { color: #c0392b; font-size: 13px; margin-top: 8px; display: none; }
    .success { color: #1D9E75; font-size: 13px; margin-top: 8px; display: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🗺</div>
    <span class="logo-text">ExploreGuard</span>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="showTab('login')">Sign In</div>
    <div class="tab" onclick="showTab('signup')">Sign Up</div>
  </div>

  <div id="login-form">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@email.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Your password"/>
    </div>
    <button class="btn" onclick="loginUser()">Sign In</button>
    <div class="error" id="login-error"></div>
  </div>

  <div id="signup-form" style="display:none">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="signup-name" placeholder="Your full name"/>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="signup-email" placeholder="you@email.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="Min 6 characters"/>
    </div>
    <button class="btn" onclick="signupUser()">Create Account</button>
    <div class="error" id="signup-error"></div>
    <div class="success" id="signup-success"></div>
  </div>
</div>

<script type="module">
  import { auth, db } from './firebase-config.js';
  import { createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // If already logged in, go straight to dashboard
  onAuthStateChanged(auth, (user) => {
    if (user) window.location.href = 'dashboard.html';
  });

  window.showTab = (tab) => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab')[tab === 'login' ? 0 : 1].classList.add('active');
    document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
  };

  window.loginUser = async () => {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');
    try {
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = 'dashboard.html';
    } catch (e) {
      errEl.textContent = 'Invalid email or password. Please try again.';
      errEl.style.display = 'block';
    }
  };

  window.signupUser = async () => {
    const name = document.getElementById('signup-name').value;
    const email = document.getElementById('signup-email').value;
    const password = document.getElementById('signup-password').value;
    const errEl = document.getElementById('signup-error');
    const sucEl = document.getElementById('signup-success');
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: name });
      // Save user profile to Firestore database (CREATE operation)
      await setDoc(doc(db, 'users', cred.user.uid), {
        name: name,
        email: email,
        createdAt: new Date().toISOString()
      });
      sucEl.textContent = 'Account created! Redirecting...';
      sucEl.style.display = 'block';
      setTimeout(() => window.location.href = 'dashboard.html', 1500);
    } catch (e) {
      errEl.textContent = e.message;
      errEl.style.display = 'block';
    }
  };
</script>
</body>
</html>
