<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ExploreGuard — Book Transport</title>
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Linked Modular Stylesheets -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/booking.css">
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">
    <i data-lucide="map" style="stroke-width:2.5px;"></i> ExploreGuard
  </a>
  <a class="back-btn" href="dashboard.html"><i data-lucide="arrow-left" style="width:16px;"></i> Dashboard</a>
</nav>

<div class="container">
  <div class="header-section">
    <h2>Book Transport</h2>
    <p class="subtitle">Secure premium flights, train routes, & local cabs</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="setType('Flight', this)">
      <i data-lucide="plane"></i> Flight
    </button>
    <button class="tab" onclick="setType('Railway', this)">
      <i data-lucide="train"></i> Railway
    </button>
    <button class="tab" onclick="setType('Cab', this)">
      <i data-lucide="car"></i> Cab
    </button>
  </div>

  <div class="form-card">
    <div class="form-row">
      <div class="form-group">
        <label>FROM</label>
        <div class="input-wrapper">
          <input type="text" id="from" placeholder="e.g. Imphal" required/>
          <i data-lucide="map-pin"></i>
        </div>
      </div>
      <div class="form-group">
        <label>TO</label>
        <div class="input-wrapper">
          <input type="text" id="to" placeholder="e.g. Delhi" required/>
          <i data-lucide="navigation"></i>
        </div>
      </div>
    </div>
    
    <div class="form-row">
      <div class="form-group">
        <label>DATE</label>
        <div class="input-wrapper">
          <input type="date" id="date" required/>
          <i data-lucide="calendar"></i>
        </div>
      </div>
      <div class="form-group">
        <label>PASSENGERS</label>
        <div class="input-wrapper">
          <select id="passengers">
            <option value="1">1 Passenger</option>
            <option value="2">2 Passengers</option>
            <option value="3">3 Passengers</option>
            <option value="4">4+ Passengers</option>
          </select>
          <i data-lucide="users"></i>
        </div>
      </div>
    </div>
    
    <div class="form-group" style="margin-bottom:1.5rem">
      <label>SPECIAL REQUESTS (optional)</label>
      <div class="input-wrapper">
        <input type="text" id="notes" placeholder="e.g. Window seat, wheelchair, baby bassinet"/>
        <i data-lucide="message-square"></i>
      </div>
    </div>
    
    <button class="btn" onclick="saveBooking()">
      Confirm Booking <i data-lucide="check" style="width:18px;"></i>
    </button>
    
    <div class="success-msg" id="success-msg">
      <i data-lucide="check-circle" style="width:20px; height:20px;"></i>
      <span>Booking confirmed successfully! You can track this pass on your dashboard.</span>
    </div>
  </div>
</div>

<!-- External Modular JavaScript -->
<script type="module" src="js/booking.js"></script>
</body>
</html>
