<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ExploreGuard — Weather Alerts</title>
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --primary: #1D9E75;
      --primary-hover: #157A5A;
      --primary-light: #e1f5ee;
      --accent: #E2B13C;
      --dark: #0f172a;
      --dark-muted: #475569;
      --light: #f8fafc;
      --white: #ffffff;
      --border: rgba(15, 23, 42, 0.08);
      --glass: rgba(255, 255, 255, 0.88);
      --shadow-sm: 0 4px 10px rgba(0, 0, 0, 0.02);
      --shadow-md: 0 10px 30px rgba(29, 158, 117, 0.08);
      --shadow-lg: 0 20px 40px rgba(15, 23, 42, 0.05);
      --font: 'Plus Jakarta Sans', system-ui, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font);
      background: linear-gradient(135deg, rgba(240, 250, 245, 0.93), rgba(225, 245, 238, 0.93)), url('travel_bg.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
      color: var(--dark);
    }

    /* Sticky Navigation */
    nav {
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 1.25rem 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(226, 232, 240, 0.8);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 20px;
      font-weight: 800;
      color: var(--primary);
      text-decoration: none;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      background: transparent;
      border: 1.5px solid var(--primary);
      color: var(--primary);
      border-radius: 50px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s ease;
    }
    .back-btn:hover {
      background: var(--primary);
      color: var(--white);
      box-shadow: 0 4px 10px rgba(29, 158, 117, 0.2);
    }

    /* Main Container */
    .container {
      max-width: 800px;
      margin: 3rem auto;
      padding: 0 1.5rem;
    }
    
    .header-section {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeInDown 0.5s ease;
    }
    h2 {
      font-size: clamp(24px, 4vw, 32px);
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -1.5px;
      margin-bottom: 0.25rem;
    }
    .subtitle {
      color: var(--dark-muted);
      font-size: 16px;
      font-weight: 500;
    }

    /* Premium Search Bar */
    .search-row {
      display: flex;
      gap: 12px;
      margin-bottom: 1.5rem;
      position: relative;
      animation: fadeInUp 0.5s ease;
    }
    .search-wrapper {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
    }
    .search-wrapper i {
      position: absolute;
      left: 16px;
      color: var(--dark-muted);
      width: 18px;
      height: 18px;
    }
    .search-row input {
      width: 100%;
      padding: 14px 14px 14px 46px;
      border: 1.5px solid rgba(15, 23, 42, 0.1);
      border-radius: 14px;
      font-size: 15px;
      outline: none;
      background: rgba(255, 255, 255, 0.95);
      font-family: var(--font);
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
    }
    .search-row input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(29, 158, 117, 0.08);
    }
    .search-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 24px;
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(29, 158, 117, 0.15);
      transition: all 0.2s ease;
    }
    .search-btn:hover {
      background: var(--primary-hover);
      box-shadow: 0 6px 18px rgba(29, 158, 117, 0.25);
    }

    /* Quick select badges */
    .cities-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 2.5rem;
      animation: fadeInUp 0.5s ease;
    }
    .city-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      background: var(--glass);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 50px;
      cursor: pointer;
      font-size: 13.5px;
      font-weight: 700;
      color: var(--dark-muted);
      transition: all 0.2s ease;
      box-shadow: var(--shadow-sm);
    }
    .city-chip:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--white);
      transform: translateY(-1px);
    }
    .city-chip i {
      width: 14px;
      height: 14px;
      color: var(--primary);
    }

    /* Live Weather Display Widget */
    .weather-card {
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 2.5rem 2.25rem;
      border: 1px solid rgba(255, 255, 255, 0.5);
      margin-bottom: 20px;
      box-shadow: var(--shadow-lg);
      animation: fadeInUp 0.6s ease;
    }
    .weather-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 1.5rem;
    }
    .city-details {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .city-name {
      font-size: 24px;
      font-weight: 800;
      color: var(--dark);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .city-name i {
      color: var(--primary);
    }
    .condition {
      font-size: 15.5px;
      font-weight: 600;
      color: var(--dark-muted);
      text-transform: capitalize;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .temp {
      font-size: 52px;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -2px;
    }

    /* Metric telemetries grid */
    .weather-details {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(15, 23, 42, 0.06);
    }
    .detail-item {
      text-align: center;
      background: rgba(255, 255, 255, 0.6);
      padding: 14px 10px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: all 0.2s ease;
    }
    .detail-item:hover {
      background: var(--white);
      transform: translateY(-2px);
      box-shadow: var(--shadow-sm);
    }
    .detail-item i {
      color: var(--primary);
      width: 20px;
      height: 20px;
    }
    .detail-val {
      font-size: 17px;
      font-weight: 800;
      color: var(--dark);
    }
    .detail-key {
      font-size: 12px;
      font-weight: 600;
      color: var(--dark-muted);
    }

    /* Warning Banners */
    .alert-box {
      border-radius: 16px;
      padding: 16px 20px;
      margin-top: 1.5rem;
      font-size: 14.5px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
      line-height: 1.6;
    }
    .alert-safe {
      background: #e1f5ee;
      color: #0F6E56;
      border: 1px solid rgba(15, 110, 86, 0.15);
    }
    .alert-safe i { color: #0F6E56; }
    
    .alert-warn {
      background: #fffbeb;
      color: #b45309;
      border: 1px solid rgba(180, 83, 9, 0.15);
    }
    .alert-warn i { color: #b45309; }
    
    .alert-danger {
      background: #fdf0f0;
      color: #c0392b;
      border: 1px solid rgba(192, 57, 43, 0.15);
    }
    .alert-danger i { color: #c0392b; }

    .loading {
      text-align: center;
      color: var(--dark-muted);
      padding: 3rem 2rem;
      font-size: 15px;
      font-weight: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media(max-width: 600px) {
      .weather-details {
        grid-template-columns: 1fr 1fr;
      }
      .weather-top {
        flex-direction: column;
        align-items: flex-start;
      }
      .temp {
        align-self: flex-end;
      }
    }
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">
    <i data-lucide="map" style="stroke-width:2.5px;"></i> ExploreGuard
  </a>
  <a class="back-btn" href="dashboard.html"><i data-lucide="arrow-left" style="width:16px;"></i> Dashboard</a>
</nav>

<div class="container">
  <div class="header-section">
    <h2>Weather & Climate Alerts</h2>
    <p class="subtitle">Real-time localized meteorological advisory in Northeast India</p>
  </div>

  <div class="search-row">
    <div class="search-wrapper">
      <input type="text" id="city-input" placeholder="Search city e.g. Imphal, Shillong, Kohima..." onkeydown="if(event.key==='Enter') searchCity()"/>
      <i data-lucide="search"></i>
    </div>
    <button class="search-btn" onclick="searchCity()">
      Search <i data-lucide="arrow-right" style="width:16px;"></i>
    </button>
  </div>

  <div class="cities-grid">
    <div class="city-chip" onclick="fetchWeather('Imphal')"><i data-lucide="map-pin"></i> Imphal</div>
    <div class="city-chip" onclick="fetchWeather('Shillong')"><i data-lucide="map-pin"></i> Shillong</div>
    <div class="city-chip" onclick="fetchWeather('Kohima')"><i data-lucide="map-pin"></i> Kohima</div>
    <div class="city-chip" onclick="fetchWeather('Agartala')"><i data-lucide="map-pin"></i> Agartala</div>
    <div class="city-chip" onclick="fetchWeather('Guwahati')"><i data-lucide="map-pin"></i> Guwahati</div>
    <div class="city-chip" onclick="fetchWeather('Aizawl')"><i data-lucide="map-pin"></i> Aizawl</div>
  </div>

  <div id="weather-result">
    <div class="loading">
      <i data-lucide="map" class="animate-pulse" style="width:36px; height:36px; color:var(--primary);"></i>
      <span>Select a quick city chip or enter a query above.</span>
    </div>
  </div>
</div>

<script type="module">
  import { auth } from './firebase-config.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // Initialize Lucide Icons
  lucide.createIcons();

  onAuthStateChanged(auth, (user) => {
    if (!user) window.location.href = 'login.html';
  });

  // OpenWeatherMap free API key
  const API_KEY = '6a021b2cbb192d2064328037610164a9';

  window.searchCity = () => {
    const city = document.getElementById('city-input').value.trim();
    if (city) fetchWeather(city);
  };

  window.fetchWeather = async (city) => {
    const result = document.getElementById('weather-result');
    result.innerHTML = `
      <div class="loading">
        <i data-lucide="loader" class="animate-spin" style="width:24px; height:24px; color:var(--primary);"></i>
        <span>Contacting meteorology satellites...</span>
      </div>`;
    lucide.createIcons();
    
    try {
      const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city},IN&appid=${API_KEY}&units=metric`);
      if (!res.ok) throw new Error('City not found');
      const data = await res.json();

      const temp = Math.round(data.main.temp);
      const humidity = data.main.humidity;
      const wind = Math.round(data.wind.speed * 3.6); // m/s to km/h
      const condition = data.weather[0].description;
      const visibility = data.visibility ? Math.round(data.visibility / 1000) : 'N/A';

      // Safety alert logic based on weather conditions
      let alertClass = 'alert-safe';
      let alertMsg = 'Weather looks optimal for sightseeing and transit operations.';
      let alertIcon = 'check-circle';
      
      if (data.weather[0].main === 'Thunderstorm') {
        alertClass = 'alert-danger';
        alertMsg = 'Severe Thunderstorm warnings active! Severe lightning threat, seek indoors immediately.';
        alertIcon = 'alert-circle';
      } else if (data.weather[0].main === 'Rain' && data.rain && data.rain['1h'] > 10) {
        alertClass = 'alert-warn';
        alertMsg = 'Heavy monsoon precipitation. High risk of torrential mudslides in montane paths. Drive cautiously.';
        alertIcon = 'alert-triangle';
      } else if (wind > 50) {
        alertClass = 'alert-warn';
        alertMsg = 'Substantial wind velocities. Exercise high caution on open road bypasses and valleys.';
        alertIcon = 'alert-triangle';
      } else if (data.weather[0].main === 'Fog' || visibility < 1) {
        alertClass = 'alert-warn';
        alertMsg = 'Impaired road visibility due to dense fog banks. Maximize headlight utilization.';
        alertIcon = 'alert-triangle';
      }

      result.innerHTML = `
        <div class="weather-card">
          <div class="weather-top">
            <div class="city-details">
              <div class="city-name"><i data-lucide="map-pin"></i> ${data.name}, ${data.sys.country}</div>
              <div class="condition"><i data-lucide="cloud"></i> ${condition}</div>
            </div>
            <div class="temp">${temp}°C</div>
          </div>
          <div class="weather-details">
            <div class="detail-item">
              <i data-lucide="droplets"></i>
              <div class="detail-val">${humidity}%</div>
              <div class="detail-key">Humidity</div>
            </div>
            <div class="detail-item">
              <i data-lucide="wind"></i>
              <div class="detail-val">${wind} km/h</div>
              <div class="detail-key">Wind Speed</div>
            </div>
            <div class="detail-item">
              <i data-lucide="eye"></i>
              <div class="detail-val">${visibility} km</div>
              <div class="detail-key">Visibility</div>
            </div>
            <div class="detail-item">
              <i data-lucide="thermometer"></i>
              <div class="detail-val">${Math.round(data.main.feels_like)}°C</div>
              <div class="detail-key">Feels Like</div>
            </div>
          </div>
          <div class="alert-box ${alertClass}">
            <i data-lucide="${alertIcon}" style="width:22px; height:22px; flex-shrink:0;"></i>
            <span><strong>Status Update:</strong> ${alertMsg}</span>
          </div>
        </div>`;
      lucide.createIcons();
    } catch (e) {
      result.innerHTML = `
        <div class="weather-card" style="border-color: rgba(231, 76, 60, 0.2);">
          <div class="alert-box alert-danger">
            <i data-lucide="alert-circle" style="width:22px;"></i>
            <span><strong>Satellite Outage:</strong> City could not be queried or network timeout. Please verify city name spelling.</span>
          </div>
        </div>`;
      lucide.createIcons();
    }
  };

  // Auto load Imphal weather on page open
  fetchWeather('Imphal');
</script>
</body>
</html>
